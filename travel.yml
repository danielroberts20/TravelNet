# travel.yml
# Single source of truth for the TravelNet trip itinerary.
# Consumed by: cron/push_public_stats.py, docs site, portfolio, README.
#
# Status inference (in priority order):
#   1. meta.status_override — set this if auto-inference is wrong
#   2. Inferred from leg actual/planned dates:
#        pre_departure  → today is before first leg's arrival
#        travelling     → at least one leg has started
#        finished       → all legs have an actual departure date
#
# Current leg inference:
#   The leg where today >= arrival AND (departure is null OR today <= departure).
#   Actual dates take precedence over planned dates.
#   Set meta.current_leg_override to force a specific leg id.

meta:
  status_override: null       # null | pre_departure | travelling | finished
  current_leg_override: null  # null | leg id e.g. "australia"
  base_country: "UK"
  base_city: "London"
  trip_start: "2026-06-11"    # date of first departure — used for countdown
  display:
    pill: "Pre-departure · Testing TravelNet"
    label: "London, UK"
    description: "Hardening TravelNet infrastructure before departure in June 2026."
    location: "London, UK"
  map:
    lon: -0.1
    lat: 51.5
    label: "UK"
    above: true
  # Budget normalisation settings — used by ML pipeline and cost-of-living comparisons
  budget:
    currency: "GBP"
    baseline_country: "UK"          # cost-of-living normalisation baseline
  # ML pipeline configuration — consumed by scheduled_tasks and Trevor
  ml:
    phase_1_start_leg: "australia"  # leg id where ML pipeline activates
    phase_1_day_threshold: 60       # minimum days of data before phase 1 runs
  departure_airport: "LHR"
  departure_terminal: "3"

# External URLs — consumed by travel.ts (web build) and Trevor system prompt.
# Centralised here so downstream files do not hardcode URLs.
links:
  github_repo: "https://github.com/danielroberts20/TravelNet"
  trevor_repo: "https://github.com/danielroberts20/Trevor-For-TravelNet"
  docs_url: "https://docs.travelnet.dev"
  demo_url: "https://travelnet.dev"
  portfolio_url: "https://danielroberts20.github.io"
  linkedin_url: "https://linkedin.com/in/danielroberts20"

# Portfolio / author metadata — consumed by the demo site and portfolio page.
portfolio:
  name: "Dan Roberts"
  github_handle: "danielroberts20"
  linkedin_handle: "danielroberts20"

