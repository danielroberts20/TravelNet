# travel.yml
# Single source of truth for the TravelNet trip itinerary.
# Consumed by: cron/push_public_stats.py, docs site, portfolio, README.
#
# Status inference (in priority order):
#   1. meta.status_override — set this if auto-inference is wrong
#   2. Inferred from leg actual/planned dates:
#        pre_departure  → today is before first leg's arrival
#        travelling     → at least one leg has started
#        finished       → all legs have an actual departure date
#
# Current leg inference:
#   The leg where today >= arrival AND (departure is null OR today <= departure).
#   Actual dates take precedence over planned dates.
#   Set meta.current_leg_override to force a specific leg id.

meta:
  status_override: null       # null | pre_departure | travelling | finished
  current_leg_override: null  # null | leg id e.g. "australia"
  base_country: "UK"
  base_city: "London"
  trip_start: "2026-06-11"    # date of first departure — used for countdown

