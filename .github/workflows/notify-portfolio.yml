name: Notify portfolio on travel.yml change

on:
  push:
    branches: [main]
    paths: [travel.yml]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger portfolio sync
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PORTFOLIO_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/danielroberts20/danielroberts20.github.io/dispatches \
            -d '{"event_type":"travel-data-updated"}'