name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TravelNet

    steps:
      - uses: actions/checkout@v4
        with:
          path: TravelNet

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: TravelNet/server/app/requirements.txt

      - name: Install dependencies
        run: pip install -r server/app/requirements.txt

      - name: Run tests
        run: pytest
