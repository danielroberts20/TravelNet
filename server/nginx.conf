events {}
http {
    # Custom log format that excludes 200/304 responses
    log_format filtered '$remote_addr - [$time_local] "$request" $status';

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name pi-server.tail186ff8.ts.net;

        ssl_certificate     /certs/pi-server.tail186ff8.ts.net.crt;
        ssl_certificate_key /certs/pi-server.tail186ff8.ts.net.key;

        # Silence noisy polling endpoints entirely
        location /api/status {
            access_log off;
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /manifest.json {
            access_log off;
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600;
        }
    }
}