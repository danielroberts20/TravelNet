events {}
http {
    log_format filtered '$remote_addr - [$time_local] "$request" $status';

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name travelnet.tail186ff8.ts.net;

        ssl_certificate     /certs/travelnet.tail186ff8.ts.net.crt;
        ssl_certificate_key /certs/travelnet.tail186ff8.ts.net.key;

        location /api/status {
            access_log off;
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /manifest.json {
            access_log off;
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://travelnet-dashboard:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600;
        }
    }

    server {
        listen 443 ssl;
        server_name api.travelnet.dev;

        ssl_certificate     /etc/letsencrypt/live/api.travelnet.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.travelnet.dev/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://ingest:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}