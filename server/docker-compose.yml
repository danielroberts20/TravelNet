services:
  ingest:
    build: .
    image: travelnet:latest
    container_name: travelnet
    init: true
    env_file: .env
    environment:
      CRONTAB_FILE: "/var/spool/cron/crontabs/dan"
      PREFECT_API_URL: "http://travelnet.tail186ff8.ts.net:4200/api"
    volumes:
      - /mnt/ssd/docker/services/travelnet/data:/data
      - /mnt/linux/docker/services/travelnet/data/backups:/data/backups
      - ./app:/app
      - /home/dan/.config/rclone:/root/.config/rclone:ro
      - /var/spool/cron/crontabs/dan:/var/spool/cron/crontabs/dan
      - /home/dan/services/TravelNet/travel.yml:/travel.yml:rw
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - travelnet

  dashboard:
    build:
      context: ../../Dashboard
    container_name: travelnet-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD_TOKEN:       "${DASHBOARD_TOKEN}"
      FLASK_SECRET_KEY:      "${FLASK_SECRET_KEY}"
      DB_PATH:               "/data/travel.db"
      FASTAPI_URL:           "http://ingest:8000"
      FASTAPI_API_KEY:       "${UPLOAD_TOKEN}"
      DOCKER_CONTAINER_NAME: "travelnet"
      TREVOR_CONTAINER_NAME: "trevor"
      TREVOR_URL:            "${TREVOR_URL}"
      TREVOR_API_KEY:        "${TREVOR_API_KEY}"
      WATCHDOG_IP: "${WATCHDOG_IP}"
    volumes:
      - /mnt/ssd/docker/services/travelnet/data:/data:ro
      - /mnt/linux/docker/services/travelnet/data/backups:/data/backups:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/dan/services/Dashboard:/app
      - /home/dan/services/TravelNet/server:/travelnet-server:ro
      - /home/dan/services/codex:/docs:ro
      - /home/dan/services/TravelNet/travel.yml:/travel.yml:rw
    depends_on:
      - ingest
    networks:
      - travelnet

  nginx:
    image: nginx:alpine
    container_name: travelnet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/dan/services/Dashboard/certs:/certs:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - dashboard
    networks:
      - travelnet

  prefect-worker:
    build: .
    image: travelnet:latest
    command: python -m deployments
    init: true
    env_file: .env
    environment:
      - PREFECT_API_URL=http://travelnet.tail186ff8.ts.net:4200/api
    volumes:
      - /mnt/ssd/docker/services/travelnet/data:/data
      - /mnt/linux/docker/services/travelnet/data/backups:/data/backups
      - ./app:/app
      - /mnt/linux/docker/services/travelnet/data/backup_db_to_cloudflare.sh:/backup_db_to_cloudflare.sh:ro  # unchanged (script stays on HDD)
      - /mnt/linux/docker/services/travelnet/.travelnet_backup_key:/backup_key:ro  # FIXED: sane container path
      - /home/dan/.config/rclone:/root/.config/rclone:ro
    restart: unless-stopped
    depends_on:
      - ingest
    networks:
      - travelnet

networks:
  travelnet:
    name: travelnet
